name: NewAPI 自动签到

on:
  # 定时执行：每天北京时间 1:00（UTC 前一天 17:00）
  schedule:
    - cron: '0 17 * * *'
  # 手动触发
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      LOG_DATE: unknown
      LOG_FILE: logs/checkin-run-${{ github.run_id }}-${{ github.run_attempt }}.log

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 初始化每日日志
        shell: bash
        run: |
          LOG_DATE="$(TZ=Asia/Shanghai date +%F)"
          LOG_FILE="logs/checkin-${LOG_DATE}-run-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}.log"
          mkdir -p logs
          echo "LOG_DATE=${LOG_DATE}" >> "$GITHUB_ENV"
          echo "LOG_FILE=${LOG_FILE}" >> "$GITHUB_ENV"

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 安装 Playwright 浏览器
        run: playwright install chromium --with-deps

      - name: 执行签到并记录日志
        id: checkin
        shell: bash
        env:
          TASK_MODE: checkin
          CONFIG_URL: ${{ secrets.CONFIG_URL }}
          CONFIG_AUTH: ${{ secrets.CONFIG_AUTH }}
          NEWAPI_ACCOUNTS: ${{ secrets.NEWAPI_ACCOUNTS }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          set +e
          python -u checkin.py 2>&1 | tee "$LOG_FILE"
          CHECKIN_EXIT=${PIPESTATUS[0]}
          set -e

          python - <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ["LOG_FILE"])
          text = path.read_text(encoding="utf-8", errors="replace")
          for name in (
              "CONFIG_URL",
              "CONFIG_AUTH",
              "NEWAPI_ACCOUNTS",
              "DINGTALK_WEBHOOK",
              "DINGTALK_SECRET",
          ):
              value = os.environ.get(name, "")
              if value:
                  text = text.replace(value, "***")
          path.write_text(text, encoding="utf-8")
          PY

          exit "$CHECKIN_EXIT"

      - name: 写入 Actions 摘要
        if: always()
        shell: bash
        run: |
          {
            echo "## NewAPI 每日签到记录"
            echo
            echo "- 日期（北京时间）：${LOG_DATE}"
            echo "- 工作流运行：#${GITHUB_RUN_NUMBER}（尝试 ${GITHUB_RUN_ATTEMPT}）"
            echo "- 签到步骤结果：${{ steps.checkin.outcome }}"
            echo
            if [[ -f "$LOG_FILE" ]]; then
              echo "<details><summary>查看签到输出（最后 300 行）</summary>"
              echo
              echo '```text'
              tail -n 300 "$LOG_FILE"
              echo '```'
              echo "</details>"
            else
              echo "> 签到日志未生成，请查看前置步骤错误。"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 上传每日日志附件
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkin-log-${{ env.LOG_DATE }}-run-${{ github.run_number }}-${{ github.run_attempt }}
          path: ${{ env.LOG_FILE }}
          if-no-files-found: warn
          retention-days: 90
