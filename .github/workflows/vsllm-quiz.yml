name: 维云每日答题

on:
  # 北京时间每天 00:15（UTC 前一天 16:15）
  schedule:
    - cron: '15 16 * * *'
  workflow_dispatch:

concurrency:
  group: vsllm-tasks-${{ github.repository }}
  cancel-in-progress: false

jobs:
  quiz:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      LOG_DATE: unknown
      LOG_FILE: logs/vsllm-quiz-run-${{ github.run_id }}-${{ github.run_attempt }}.log

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 初始化答题日志
        shell: bash
        run: |
          LOG_DATE="$(TZ=Asia/Shanghai date +%F)"
          LOG_FILE="logs/vsllm-quiz-${LOG_DATE}-run-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}.log"
          mkdir -p logs
          echo "LOG_DATE=${LOG_DATE}" >> "$GITHUB_ENV"
          echo "LOG_FILE=${LOG_FILE}" >> "$GITHUB_ENV"

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行每日答题并记录日志
        id: quiz
        shell: bash
        env:
          CONFIG_URL: ${{ secrets.CONFIG_URL }}
          CONFIG_AUTH: ${{ secrets.CONFIG_AUTH }}
          NEWAPI_ACCOUNTS: ${{ secrets.NEWAPI_ACCOUNTS }}
        run: |
          set +e
          python -u vsllm_tasks.py --task quiz 2>&1 | tee "$LOG_FILE"
          TASK_EXIT=${PIPESTATUS[0]}
          set -e

          python - <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ["LOG_FILE"])
          text = path.read_text(encoding="utf-8", errors="replace")
          for name in (
              "CONFIG_URL",
              "CONFIG_AUTH",
              "NEWAPI_ACCOUNTS",
          ):
              value = os.environ.get(name, "")
              if value:
                  text = text.replace(value, "***")
          path.write_text(text, encoding="utf-8")
          PY

          exit "$TASK_EXIT"

      - name: 写入答题 Actions 摘要
        if: always()
        shell: bash
        run: |
          {
            echo "## 维云每日答题记录"
            echo
            echo "- 日期（北京时间）：${LOG_DATE}"
            echo "- 工作流运行：#${GITHUB_RUN_NUMBER}（尝试 ${GITHUB_RUN_ATTEMPT}）"
            echo "- 答题步骤结果：${{ steps.quiz.outcome }}"
            echo
            if [[ -f "$LOG_FILE" ]]; then
              echo '<details><summary>查看答题输出（最后 500 行）</summary>'
              echo
              echo '```text'
              tail -n 500 "$LOG_FILE"
              echo '```'
              echo '</details>'
            else
              echo '> 答题日志未生成，请查看前置步骤错误。'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 上传答题日志附件
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vsllm-quiz-log-${{ env.LOG_DATE }}-run-${{ github.run_number }}-${{ github.run_attempt }}
          path: ${{ env.LOG_FILE }}
          if-no-files-found: warn
          retention-days: 90
