name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Worker tooling
        run: npm ci --prefix worker
      - name: Check Worker and dashboard JavaScript
        run: npm run check --prefix worker
      - name: Run Worker tests
        run: npm test --prefix worker
      - name: Run legacy JavaScript compatibility tests
        run: node --test tests/*.test.mjs
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Run Python tests
        run: python -m unittest -v test_checkin tests.test_gwent tests.test_vsllm_tasks
