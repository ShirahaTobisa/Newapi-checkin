name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run browser generator and Worker tests
        run: node --test tests/*.test.mjs worker/test/*.test.mjs
